<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消费记账 · 添加记录 & 总计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -20px rgba(0,20,40,0.3), 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            padding: 2rem 2rem 2.2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a2639;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.8rem;
        }
        h1 span {
            background: #2c3e50;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        /* 添加区域 */
        .add-section {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2.3rem;
            box-shadow: 0 6px 14px rgba(0,10,30,0.08);
            border: 1px solid #ffffff;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1rem 1.2rem;
        }
        .input-group {
            flex: 1 1 180px;
            min-width: 0;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #4a5a72;
            margin-bottom: 0.3rem;
            margin-left: 0.5rem;
        }
        .input-group input {
            width: 100%;
            background: #f8fafd;
            border: 1.5px solid #dfe6ef;
            border-radius: 40px;
            padding: 0.85rem 1.4rem;
            font-size: 1rem;
            font-weight: 500;
            color: #1d2b3f;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #3b6fa0;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59,111,160,0.15);
        }
        .input-group input::placeholder {
            color: #a7b8cc;
            font-weight: 400;
            font-size: 0.95rem;
        }
        .add-btn {
            background: #1d2b3f;
            border: none;
            border-radius: 60px;
            padding: 0.85rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 10px 18px -8px #0f1a2e;
            transition: 0.15s;
            border: 1px solid #314b66;
            margin-top: 0.2rem;
            white-space: nowrap;
        }
        .add-btn:hover {
            background: #243856;
            transform: scale(1.02);
            box-shadow: 0 14px 22px -10px #0f1f33;
        }
        .add-btn:active {
            background: #152233;
            transform: scale(0.98);
        }
        /* 表格容器 */
        .table-container {
            background: white;
            border-radius: 28px;
            padding: 0.3rem 0.1rem 0.1rem 0.1rem;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.02), 0 12px 24px -16px rgba(26,38,62,0.2);
            border: 1px solid rgba(255,255,255,0.9);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border-style: hidden;
            font-size: 1rem;
            min-width: 580px;
        }
        th {
            text-align: left;
            padding: 1.2rem 1rem 1rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: #52718e;
            background: transparent;
            border-bottom: 2px solid #dbe2ec;
        }
        td {
            padding: 1rem 1rem 1rem 1.5rem;
            border-bottom: 1px solid #e9eef4;
            color: #162b3a;
            font-weight: 500;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .price-col {
            font-weight: 600;
            color: #1f3b4f;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 40px;
            color: #8f9fb1;
            transition: all 0.15s;
            line-height: 1;
        }
        .action-btn:hover {
            background: #f0f4fc;
            color: #c4434b;
            transform: scale(1.1);
        }
        .action-btn:active {
            transform: scale(0.9);
        }
        /* 总计行 */
        .total-row {
            border-top: 2px solid #cddaea;
            font-weight: 700;
        }
        .total-row td {
            padding-top: 1.2rem;
            padding-bottom: 1.2rem;
            color: #102331;
        }
        .total-label {
            font-size: 1.1rem;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }
        .total-number {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0e2b3f;
        }
        .empty-message {
            text-align: center;
            color: #8c9db2;
            font-style: italic;
            padding: 2.5rem !important;
            font-size: 1.1rem;
        }
        /* 编号列窄一点 */
        .id-col {
            width: 80px;
            color: #6d7f97;
            font-weight: 500;
        }
        .price-col {
            width: 140px;
        }
        .action-col {
            width: 70px;
            text-align: center;
        }
        .footer-note {
            margin-top: 1.2rem;
            text-align: right;
            font-size: 0.9rem;
            color: #5b708b;
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <h1>
        📋 消费流水账
        <span>可添加 · 实时总计</span>
    </h1>

    <!-- 上方添加记录区域 -->
    <div class="add-section">
        <div class="form-row">
            <div class="input-group">
                <label>📌 消费名称</label>
                <input v-model="newItem.name" type="text" id="itemName" placeholder="例：午餐、电影、网费" autocomplete="off" @keydown.enter="addItem()">
            </div>
            <div class="input-group">
                <label>💰 金额（元）</label>
                <input v-model="newItem.price" type="number" id="itemPrice" placeholder="0.00" min="0" step="0.01" autocomplete="off" @keydown.enter="addItem()">
            </div>
            <button class="add-btn" id="addRecordBtn" @click="addItem(newItem.name, newItem.price)">
                <span>+</span> 添加记录
            </button>
        </div>
    </div>

    <!-- 消费表格 -->
    <div class="table-container">
        <table id="expenseTable">
            <thead>
            <tr>
                <th class="id-col">编号</th>
                <th>消费名称</th>
                <th class="price-col">价格 (¥)</th>
                <th class="action-col">操作</th>
            </tr>
            </thead>
            <tbody id="tableBody">
                <tr v-for="(item, index) in items" :key="item.id">
                    <td class="id-col">{{ index + 1 }}</td>
                    <td>{{ item.name }}</td>
                    <td class="price-col" :style="{color: item.price > 500 ? 'red' : 'black'}">{{ item.price }}</td>
                    <td class="action-col">
                        <button class="action-btn" @click="deleteItem(index)">
                            ✕
                        </button>
                    </td>
                </tr>
                <tr class="total-row">
                    <td colspan="2">合计</td>
                    <td class="price-col total-number">{{ total }}</td>
                    <td class="action-col"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="footer-note">
        ⚡ 点击 <span style="background:#eef3fb; padding:2px 8px; border-radius:30px;">✕</span> 删除记录，总计自动更新
    </div>

    <div class="echarts-box" id="echartsBox">
        <div id="chart" style="width: 100%; height: 400px;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@0.12.0/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script>
    new Vue({
        el: '#app',
        data: {
            items: [
                { id: 1, name: '午餐', price: '10.00' },
                { id: 2, name: '电影', price: '50.00' },
                { id: 3, name: '网费', price: '200.00' },
                { id: 4, name: '电脑', price: '7000.00' }
            ],
            newItem: { name: '', price: '' },
        },
        computed:{
            total() {
                return this.items.reduce((total, item) => {
                    return (parseFloat(total) + parseFloat(item.price)).toFixed(2);
                }, 0);
            }
        },
        created() {

        },
        mounted(){
            var chart = echarts.init(document.getElementById('chart')); // Initialize the chart
            option = {
                title: {
                    text: '消费账单统计图',
                    subtext: '消费账单统计',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'item'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [
                    {
                        name: '消费账单',
                        type: 'pie',
                        radius: '50%',
                        data: [
                            { value: 1048, name: 'Search Engine' },
                            { value: 735, name: 'Direct' },
                            { value: 580, name: 'Email' },
                            { value: 484, name: 'Union Ads' },
                            { value: 300, name: 'Video Ads' }
                        ],
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }
                ]
            };
            chart.setOption(option);

        },
        methods: {
            addItem(name, price) {
                // 获取输入的值
                const itemName = name;
                const itemPrice = price;
                if (itemName && itemPrice) {
                    // 添加到items数组
                    this.items.push({
                        id: this.items.length + 1,
                        name: itemName,
                        price: parseFloat(itemPrice).toFixed(2)
                    });
                    // 清空输入框
                    this.newItem.name = '';
                    this.newItem.price = '';
                }
            },
            deleteItem(index) {
                this.items = this.items.filter(item => item.id !== this.items[index].id);
            }
        }
    })
</script>
<!-- 注：Inter字体通过系统回退，干净轻量 -->
</body>
</html>
