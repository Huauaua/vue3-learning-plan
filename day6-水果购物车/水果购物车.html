<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>水果购物车 · 三色样式</title>
    <style>
        /* ===== 三色定义 =====
   主色1: 暖白 #faf7f2 (背景/卡片)
   主色2: 蜜瓜橙 #f8b88b (强调/点缀)
   主色3: 深栗 #5c4b3a (文字/边框)
*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #faf7f2;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            background-color: #faf7f2;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 25px 0 0 #f8b88b;
            border: 3px solid #f8b88b;
        }


        /* 面包屑 */
        .breadcrumb {
            display: flex;
            gap: 15px;
            padding: 10px 20px;
            background-color: #faf7f2;
            border-radius: 60px;
            border: 3px solid #f8b88b;
            box-shadow: 0 6px 0 0 #f8b88b;
            margin-bottom: 30px;
        }

        .breadcrumb a {
            color: #5c4b3a;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 5px 18px;
            border-radius: 40px;
            background-color: #faf7f2;
            border: 2px solid #f8b88b;
        }

        .breadcrumb a:hover {
            background-color: #f8b88b;
            color: #faf7f2;
        }

        /* 主体表格区域 */
        .main {
            background-color: #faf7f2;
            border-radius: 36px;
            padding: 20px 0;
            margin-bottom: 25px;
            border: 3px solid #f8b88b;
            box-shadow: 0 12px 0 0 #f8b88b;
            overflow-x: auto;
            min-height: 400px;
        }

        /* 表格布局 */
        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .thead, .tbody {
            display: table-header-group;
        }

        .tr {
            display: table-row;
        }

        .td {
            display: table-cell;
            padding: 15px 10px;
            text-align: center;
            vertical-align: middle;
            color: #5c4b3a;
            border-bottom: 2px solid #f8b88b;
        }

        /* 表头样式 */
        .thead .tr {
            background-color: #f8b88b;
        }

        .thead .td {
            font-weight: 700;
            border-bottom: 3px solid #5c4b3a;
        }

        /* 表格行 */
        .tbody .tr {
            background-color: #fff8f2;
        }

        .tbody .tr:hover {
            background-color: #fff2e8;
        }

        /* 复选框 */
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #f8b88b;
        }

        /* 数字输入框 */
        .my-input-number {
            display: inline-flex;
            align-items: center;
            border: 2px solid #f8b88b;
            border-radius: 30px;
            overflow: hidden;
            background-color: #faf7f2;
        }

        .my-input-number button {
            width: 36px;
            height: 36px;
            border: none;
            background-color: #faf7f2;
            color: #5c4b3a;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .my-input-number button:hover {
            background-color: #f8b88b;
            color: #faf7f2;
        }

        .my-input-number .my-input__inner {
            width: 50px;
            text-align: center;
            font-size: 1.2rem;
            color: #5c4b3a;
            background-color: #fff8f2;
            border-left: 2px solid #f8b88b;
            border-right: 2px solid #f8b88b;
            padding: 6px 0;
        }

        .decrease {
            border-radius: 30px 0 0 30px;
        }

        .increase {
            border-radius: 0 30px 30px 0;
        }

        /* 删除按钮 */
        .td button {
            background-color: #faf7f2;
            border: 2px solid #f8b88b;
            color: #5c4b3a;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
        }

        .td button:hover {
            background-color: #f8b88b;
            color: #faf7f2;
        }

        /* 底部提示 */
        .bottom {
            text-align: center;
            align-content: center;
            font-size: 2rem;
            color: #5c4b3a;
            background-color: #faf7f2;
            border: 4px dashed #f8b88b;
            border-radius: 60px;
            padding: 25px 15px;
            box-shadow: 0 15px 0 0 #f8b88b;
            min-height: 400px;
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div class="breadcrumb"><a href="#">首页</a><a href="#">水果购物车</a></div>
    <div class="main" v-if="fruitList.length > 0">
        <div class="table">
            <!-- 表头 -->
            <div class="thead">
                <div class="tr">
                    <div class="th">选中</div>
                    <div class="th">名称</div>
                    <div class="th">数量</div>
                    <div class="th">单价</div>
                    <div class="th">小计</div>
                    <div class="th">操作</div>
                </div>
            </div>
            <!-- 表体 -->
            <div class="tbody">
                <div v-for="(item, index) in fruitList" :key="item.id" class="tr">
                    <!-- 选中 -->
                    <div class="td">
                        <label><input type="checkbox" v-model="item.ischecked"/></label>
                    </div>
                    <!-- 名称（这里缺少名称数据，先写固定值） -->
                    <div class="td">火龙果</div>
                    <!-- 数量输入组件 -->
                    <div class="td">
                        <div class="my-input-number">
                            <button class="decrease" @click="decreaseNum(item)">-</button>
                            <span class="my-input__inner">{{ item.num }}</span>
                            <button class="increase" @click="increaseNum(item)">+</button>
                        </div>
                    </div>
                    <!-- 单价 -->
                    <div class="td">¥{{ item.price }}</div>
                    <!-- 小计 -->
                    <div class="td">¥{{ item.num * item.price }}</div>
                    <!-- 操作 -->
                    <div class="td"><button @click="delItem(item.id)">删除</button></div>
                </div>
            </div>
        </div>
    </div>
    <div class="bottom" v-else>
        💧空空如也
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
<script>
    const app = new Vue({
        el: '#app',
        data: {
            fruitList: [
                {
                    id: 1,
                    name: '火龙果',
                    icon: './asset/cole.jpg',
                    ischecked: false,
                    num: 2,
                    price: 6
                },
                {
                    id: 2,
                    name: '火龙果',
                    icon: './asset/cole.jpg',
                    ischecked: false,
                    num: 2,
                    price: 6
                }
            ]
        },
        methods: {
            increaseNum(item) {
                item.num++
            },
            decreaseNum(item) {
                if (item.num > 1) {
                    item.num--
                }
            },
            delItem(id) {
                this.fruitList = this.fruitList.filter(item => item.id !== id)
            }
        }
    })
</script>
</body>
</html>
