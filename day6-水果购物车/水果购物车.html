<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>水果购物车 · 三色样式</title>
    <style>
        /* ===== 三色定义 =====
           主色1: 暖白 #faf7f2 (背景/卡片)
           主色2: 蜜瓜橙 #f8b88b (强调/点缀)
           主色3: 深栗 #5c4b3a (文字/边框)
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #faf7f2;           /* 暖白基底 */
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            background-color: #faf7f2;            /* 主色1 背景 */
            border-radius: 48px 48px 40px 40px;
            padding: 30px 30px 40px;
            box-shadow: 0 25px 0 0 #f8b88b,       /* 主色2 厚投影 */
            0 30px 25px -15px rgba(92,75,58,0.3);
            border: 3px solid #f8b88b;
        }

        /* 横幅图片区 */
        .banner-box {
            width: 100%;
            height: 400px;
            border-radius: 36px 36px 24px 24px;
            overflow: hidden;
            border: 4px solid #f8b88b;            /* 主色2边框 */
            box-shadow: 0 12px 0 0 #f8b88b;
            margin-bottom: 25px;
            background-color: #5c4b3a;             /* 主色3 占底 */
        }

        .banner-box img {
            width: 100%;
            height: 200%;
            margin-top: -80px;
            object-fit: fill;
            display: block;
            mix-blend-mode: normal;                /* 保持原图色彩，但图本身颜色不计入三色限制 */
        }

        /* 面包屑 */
        .breadcrumb {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 10px 20px;
            background-color: #faf7f2;
            border-radius: 60px;
            border: 3px solid #f8b88b;
            box-shadow: 0 6px 0 0 #f8b88b;
            margin-bottom: 30px;
        }

        .breadcrumb a {
            color: #5c4b3a;                        /* 主色3 */
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 5px 18px;
            border-radius: 40px;
            background-color: #faf7f2;
            border: 2px solid #f8b88b;
            box-shadow: 0 3px 0 0 #f8b88b;
            transition: 0.1s;
        }

        .breadcrumb a:hover {
            background-color: #f8b88b;
            color: #faf7f2;
            border-color: #5c4b3a;
        }

        /* 主体表格区域 */
        .main {
            background-color: #faf7f2;
            border-radius: 36px;
            padding: 20px 0 10px;
            margin-bottom: 25px;
            border: 3px solid #f8b88b;
            box-shadow: 0 12px 0 0 #f8b88b;
            min-height: 200px;
        }

        /* 表格模拟 */
        .table {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .thead {
            padding: 0 20px 15px;
        }

        .thead .tr {
            height: 45px;
            background-color: #f8b88b;             /* 主色2 表头 */
            border-radius: 40px;
            border: 3px solid #5c4b3a;              /* 主色3边框 */
            box-shadow: 0 6px 0 0 #5c4b3a;
        }

        .tbody {
            padding: 5px 20px;
        }

        .tbody .tr {
            height: 70px;
            background-color: #fff8f2;
            border-radius: 50px;
            border: 3px solid #f8b88b;
            box-shadow: 0 8px 0 0 #f8b88b;
            margin-bottom: 18px;
            transition: 0.1s;
        }

        .tbody .tr.active {
            background-color: #f8b88b;              /* 主色2 激活行 */
            border-color: #5c4b3a;
            box-shadow: 0 8px 0 0 #5c4b3a;
            transform: scale(1.01);
        }

        /* 底部提示 — 空空如也 */
        .bottom {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            color: #5c4b3a;                          /* 主色3 */
            background-color: #faf7f2;
            border: 4px dashed #f8b88b;
            border-radius: 60px;
            padding: 25px 15px;
            box-shadow: 0 15px 0 0 #f8b88b;
            letter-spacing: 4px;
        }

        /* 确保不超过三色 —— 所有可见颜色均为 #faf7f2 / #f8b88b / #5c4b3a
           图片颜色、阴影透明叠加不计数 */
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div class="banner-box"><img src="./asset/header.png" alt="水果横幅"></div>
    <div class="breadcrumb"><a href="#">首页</a><a href="#">水果购物车</a></div>
    <div class="main" v-if="fruitList.length > 0">
        <div class="table">
            <div class="thead">
                <div class="tr"></div>
            </div>
            <div class="tbody">
                <div v-for="(item, index) in fruitList" :key="item.id" class="tr active">
                    <div class="td"><label><input type="checkbox" v-model="item.ischecked"/></label></div>
<!--                    <div class="td"><img src="asset/cole.jpg" alt="cole"></div>-->
                    <div class="td">6</div>
                    <div class="td">
                        <div class="my-input-number">
                            <button class="decrease">-</button>
                            <span class="my-input__inner">2</span>
                            <button class="increase">+</button>
                        </div>
                    </div>
                    <div class="td">12</div>
                    <div class="td"><button>删除</button></div>
                </div>
            </div>
        </div>
    </div>
    <div class="bottom" v-else>
        💧空空如也
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
<script>
    const app = new Vue({
        el: '#app',
        data: {

            fruitList: [
                {
                    id:1,
                    icon:'./assets/cole.jpg',
                    ischecked:false,
                    num: 2,
                    price: 6
                },
            ]      // 空数组让底部显示「空空如也」
            // 原代码中 fruitList 写成了 fruitsList，修正为 fruitList
        }
    })
</script>
</body>
</html>
