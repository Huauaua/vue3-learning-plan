<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <section id="app">
        <header class="header">
            <h1>小黑记事本</h1>
            <input placeholder="请输入任务" class="new-todo">
            <button class="add" @click="add">添加</button>
        </header>

        <ul class="todo-list">
            <li class="todo" v-for="(item, index) in list" :key="item.id">
                <div class="view">
                    <span class="index">{{ index + 1 + "."}}</span>
                    <label class="todo-label">{{ item.content }}</label>
                    <button class="del" @click="del(item.id)">删除</button>
                </div>
            </li>
        </ul>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script>
        const app = new Vue({
            el: '#app',
            data: {
                list: [
                    {id: 1, content: '跑步一公里'},
                    {id: 2, content: '跳绳100次'},
                    {id: 3, content: '游泳100米'}
                ]
            },
            methods:{
                add(){
                    this.list.push({id: this.list.length + 1, content: this.$el.querySelector('.new-todo').value});
                },
                del(index){
                    this.list = this.list.filter(item => item.id !== index)
                }
            }
        });
    </script>

</body>
</html>
