<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简洁搜索框 · 纯HTML</title>
    <style>
        /* 简单的样式，为了让搜索框好看一些（但不包含任何JS逻辑） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }

        .search-container:hover {
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-color: #ccc;
        }

        .search-icon {
            font-size: 1.4rem;
            color: #666;
            margin-right: 10px;
            user-select: none;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.2rem;
            padding: 15px 5px;
            background: transparent;
            font-weight: 400;
            color: #333;
            min-width: 0; /* 防止flex溢出 */
        }

        .search-input::placeholder {
            color: #aaa;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .search-button {
            background: #f0f0f0;
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #333;
            cursor: default; /* 没有JS，所以只是默认指针 */
            transition: background 0.15s;
            border: 1px solid #ddd;
            user-select: none;
            white-space: nowrap;
        }

        .search-button:hover {
            background: #e5e5e5;
        }

        /* 完全纯HTML，没有任何JavaScript */
    </style>
</head>
<body>
<div class="search-container" id="app">
    <span class="search-icon">🔍</span>
    <input
            id="inp"
            type="text"
            class="search-input"
            placeholder="搜索您感兴趣的内容..."
            name="q"
            autocomplete="off"
            v-model="query"
            @keyup.enter="search"
    >
    <button type="button" class="search-button" @click="search">搜索</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
<script>
    new Vue({
        el: '#app',
        data: {
            query: ''
        },
        methods: {
            search() {
                // https://cn.bing.com/search?q=%E5%BE%8B%E5%B8%88
                window.open(`https://cn.bing.com/search?q=${this.query}`)
            }
        },
        mounted() {
            this.query = ''
            document.querySelector('#inp').focus()
        }
    })
</script>

</body>
</html>
