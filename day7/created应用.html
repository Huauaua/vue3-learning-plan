<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .news {
            display: flex;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .right img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .info {
            color: #666;
        }
    </style>
</head>
<body>
<div id="app">
    <ul>
        <li class="news" v-for="item in list" :key="item.id">
            <div>
                <div class="title" v-text="item.title"></div>
                <div class="info">
                    <span v-text="item.source"></span>
                    <span v-text="item.time"></span>
                </div>
            </div>
            <div class="right">
                <img :src="item.img" alt="tupian"/>
            </div>
        </li>
    </ul>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@0.12.0/dist/axios.min.js"></script>
<script>
    new Vue({
        el: '#app',
        data: {
            list:[]
        },
        async created() {
            const res = await axios.get('https://hmajax.itheima.net/api/news/')
                .then((res) => res.data.data);
            this.list = res;
            console.log(this.list);
            console.log('created');
        },
    })
</script>
</body>
</html>
